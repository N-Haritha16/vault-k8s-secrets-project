apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-db-user-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "app-db-user"
        vault.hashicorp.com/agent-inject-secret-kv-config.txt: "kv/data/app/config"
        vault.hashicorp.com/agent-inject-template-kv-config.txt: |
          {{- with secret "kv/data/app/config" -}}
          {{ range $k, $v := .Data.data -}}
          {{ $k }}={{ $v }}
          {{ end -}}
          {{- end }}
    spec:
      serviceAccountName: app-db-user-sa
      containers:
      - name: app
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "echo '--- kv-config ---'; cat /vault/secrets/kv-config.txt; echo; sleep 3600"]
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: default
spec:
  selector:
    app: sample-app
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
